<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Prototype - Multi-Product Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Product Background Themes */
        .product-A { background-color: #f0f9ff; } /* Light Blue */
        .product-S { background-color: #f5f3ff; } /* Light Purple */
        .product-T { background-color: #f0fdf4; } /* Light Green */
        .product-P { background-color: #fff7ed; } /* Light Orange */
        .product-X { background-color: #fef2f2; } /* Light Red */
        
        .card { transition: all 0.2s ease-in-out; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-gray-50 transition-colors duration-500" id="bodyTag">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h1 class="text-3xl font-extrabold mb-2 text-slate-800">Select PM Login</h1>
            <p class="text-slate-500 mb-8 text-sm">Experience data isolation between products</p>
            
            <div class="space-y-3">
                <button onclick="login('Rose PA', 'Product A')" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">Login as Rose (Product A)</button>
                <button onclick="login('Petra PS', 'Product S')" class="w-full py-4 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition shadow-lg shadow-purple-200">Login as Petra (Product S)</button>
                <button onclick="login('Terri PT', 'Product T')" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">Login as Terri (Product T)</button>
                <button onclick="login('Denis PP', 'Product P')" class="w-full py-4 bg-orange-500 text-white font-bold rounded-xl hover:bg-orange-600 transition shadow-lg shadow-orange-200">Login as Denis (Product P)</button>
                <button onclick="login('Luna PX', 'Product X')" class="w-full py-4 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition shadow-lg shadow-rose-200">Login as Luna (Product X)</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 glass p-6 rounded-2xl border border-white shadow-sm gap-4">
            <div class="text-center md:text-left">
                <h2 id="pmName" class="text-2xl font-black text-slate-800 uppercase tracking-tight">PM Name</h2>
                <div class="flex items-center justify-center md:justify-start gap-2">
                    <span class="inline-block w-3 h-3 rounded-full bg-current" id="productIndicator"></span>
                    <p id="productName" class="text-slate-600 font-bold uppercase text-xs tracking-widest">Product Name</p>
                </div>
            </div>
            <button onclick="location.reload()" class="px-6 py-2 bg-white border border-slate-200 rounded-full font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">Switch User / Logout</button>
        </header>

        <div class="space-y-16">
            <section>
                <div class="flex items-center gap-4 mb-6">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">1. Master Role Templates (OOB)</h3>
                    <div class="flex-grow h-px bg-slate-200"></div>
                </div>
                <div id="templateContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="animate-pulse bg-slate-200 h-40 rounded-xl"></div>
                </div>
            </section>

            <section>
                <div class="flex items-center gap-4 mb-6">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">2. My Drafts (Editable)</h3>
                    <div class="flex-grow h-px bg-slate-200"></div>
                </div>
                <div id="draftContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section>
                <div class="flex items-center gap-4 mb-6">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">3. Live Active Roles (Locked)</h3>
                    <div class="flex-grow h-px bg-slate-200"></div>
                </div>
                <div id="activeContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THESE WITH YOUR KEYS FROM SUPABASE SETTINGS > API
        const SUPABASE_URL = 'https://kcogtyursbmtstmxqjta.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtjb2d0eXVyc2JtdHN0bXhxanRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODA4MTYsImV4cCI6MjA5MTU1NjgxNn0.dsCD9MZ28IJ2ELo1GKNHWEUurU6VGCfEE3mxGEnrmrc';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPM = '';
        let currentProduct = '';

        // --- APP LOGIC ---

        async function login(name, product) {
            currentPM = name;
            currentProduct = product;
            
            // UI Transition
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            // Set Identity Text
            document.getElementById('pmName').innerText = name;
            document.getElementById('productName').innerText = product;
            
            // Set Visual Theme Based on Product Letter (A, S, T, P, X)
            const letter = product.charAt(product.length - 1); 
            document.getElementById('bodyTag').className = 'min-h-screen p-4 md:p-8 transition-colors duration-500 product-' + letter;
            document.getElementById('productIndicator').className = 'inline-block w-3 h-3 rounded-full ' + getIndicatorColor(letter);
            
            fetchRoles();
        }

        function getIndicatorColor(letter) {
            const colors = { 'A': 'text-blue-500', 'S': 'text-purple-500', 'T': 'text-emerald-500', 'P': 'text-orange-500', 'X': 'text-rose-500' };
            return colors[letter] || 'text-slate-400';
        }

        async function fetchRoles() {
            try {
                // Fetch Global Templates OR Roles matching current product
                const { data, error } = await supabaseClient
                    .from('roles')
                    .select('*')
                    .or(`product.eq."${currentProduct}",product.eq.GLOBAL`);

                if (error) throw error;
                renderCards(data || []);
            } catch (err) {
                console.error("Supabase Error:", err.message);
                if (SUPABASE_URL.includes('YOUR_')) {
                    alert("Please set your Supabase URL and Key in the code first!");
                }
            }
        }

        function renderCards(roles) {
            const containers = {
                template: document.getElementById('templateContainer'),
                draft: document.getElementById('draftContainer'),
                active: document.getElementById('activeContainer')
            };

            // Reset UI
            Object.values(containers).forEach(c => c.innerHTML = '');

            if (roles.length === 0) {
                containers.template.innerHTML = '<div class="col-span-full p-8 border-2 border-dashed border-slate-300 rounded-xl text-center text-slate-400">No data found. Ensure you seeded the SQL table.</div>';
            }

            roles.forEach(role => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card flex flex-col justify-between";
                
                // Permission badges
                const permsHtml = role.perms_json.map(p => 
                    `<span class="inline-block bg-slate-50 border border-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded font-bold uppercase mr-1 mb-1">${p}</span>`
                ).join('');

                card.innerHTML = `
                    <div>
                        <h4 class="font-black text-slate-800 text-lg mb-1 leading-tight">${role.role_name}</h4>
                        <div class="mb-6">${permsHtml}</div>
                    </div>
                    <div class="mt-auto">
                        ${renderActionButtons(role)}
                    </div>
                `;
                containers[role.status].appendChild(card);
            });
        }

        function renderActionButtons(role) {
            if (role.status === 'template') {
                return `<button onclick="copyToDraft(${role.id})" class="w-full py-2 bg-slate-800 text-white text-xs font-bold rounded-lg hover:bg-slate-700 transition">Copy to ${currentProduct}</button>`;
            } else if (role.status === 'draft') {
                return `
                    <div class="flex gap-2">
                        <button onclick="activate(${role.id})" class="flex-1 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition">Activate</button>
                        <button class="flex-1 py-2 border border-slate-200 text-slate-400 text-xs font-bold rounded-lg cursor-not-allowed">Edit</button>
                    </div>`;
            }
            return `<div class="w-full py-2 bg-slate-50 border border-slate-200 text-slate-400 text-[10px] font-black text-center rounded-lg uppercase tracking-widest">READ ONLY</div>`;
        }

        async function copyToDraft(id) {
            const { data: source } = await supabaseClient.from('roles').select('*').eq('id', id).single();
            
            await supabaseClient.from('roles').insert({
                product: currentProduct,
                role_name: source.role_name,
                status: 'draft',
                perms_json: source.perms_json
            });
            
            fetchRoles();
        }

        async function activate(id) {
            await supabaseClient.from('roles').update({ status: 'active' }).eq('id', id);
            fetchRoles();
        }
    </script>
</body>
</html>
