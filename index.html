<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMUM Role Management Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-A { background-color: #f0f9ff; }
        .product-S { background-color: #f5f3ff; }
        .product-T { background-color: #f0fdf4; }
        .product-P { background-color: #fff7ed; }
        .product-X { background-color: #fef2f2; }
        .card { transition: all 0.2s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-gray-50 transition-colors duration-500" id="bodyTag">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border border-slate-200">
            <h1 class="text-3xl font-extrabold mb-2 text-slate-800">PMUM Login</h1>
            <p class="text-slate-500 mb-8 text-sm font-medium uppercase tracking-widest text-center">Select your product environment</p>
            <div class="space-y-3">
                <button onclick="login('Rose PA', 'Product A')" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Login as Rose (Product A)</button>
                <button onclick="login('Petra PS', 'Product S')" class="w-full py-4 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition">Login as Petra (Product S)</button>
                <button onclick="login('Terri PT', 'Product T')" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition">Login as Terri (Product T)</button>
                <button onclick="login('Denis PP', 'Product P')" class="w-full py-4 bg-orange-500 text-white font-bold rounded-xl hover:bg-orange-600 transition">Login as Denis (Product P)</button>
                <button onclick="login('Luna PX', 'Product X')" class="w-full py-4 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition">Login as Luna (Product X)</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 glass p-6 rounded-2xl border border-white shadow-sm gap-4">
            <div class="text-center md:text-left">
                <h2 id="pmName" class="text-2xl font-black text-slate-800 uppercase tracking-tight">PM Name</h2>
                <p id="productName" class="text-slate-500 font-bold uppercase text-xs tracking-widest">Product Name</p>
            </div>
            <div class="flex items-center gap-6">
                <a id="readmeLink" href="#" target="_blank" class="text-sm font-bold text-blue-600 hover:text-blue-800 underline flex items-center gap-1">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    View Requirements (README)
                </a>
                <button onclick="location.reload()" class="px-6 py-2 bg-white border border-slate-200 rounded-full font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">Logout</button>
            </div>
        </header>

        <div class="space-y-16">
            <section>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">1. Master Role Templates (OOB)</h3>
                <div id="templateContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">2. My Drafts (Editable)</h3>
                <div id="draftContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">3. Live Active Roles (Locked)</h3>
                <div id="activeContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-white">
            <h3 class="text-xl font-black text-slate-800 mb-1">Configure Role</h3>
            <p class="text-slate-500 text-sm mb-6 font-medium text-red-500" id="modalErrorMsg"></p>
            
            <input type="hidden" id="editRoleId">
            
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Role Name</label>
                <input type="text" id="editRoleName" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-slate-700">
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Permissions</label>
                <div id="permissionOptions" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">Cancel</button>
                <button onclick="saveChanges()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://kcogtyursbmtstmxqjta.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtjb2d0eXVyc2JtdHN0bXhxanRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODA4MTYsImV4cCI6MjA5MTU1NjgxNn0.dsCD9MZ28IJ2ELo1GKNHWEUurU6VGCfEE3mxGEnrmrc';
        const PROJECT_KEY = 'PMUMRBAC_PROTOTYPE'; 
        
        // PASTE YOUR GITHUB README LINK HERE
        const GITHUB_README_URL = 'https://github.com/YOUR_USERNAME/YOUR_REPO/blob/main/README.md';
        document.getElementById('readmeLink').href = GITHUB_README_URL;

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const ALL_PERMISSIONS = ["View Reports", "Invite User", "Refunds", "Manage Schedule", "Create Sale", "View Catalog", "Void Transactions"];
        let currentPM = '', currentProduct = '', cachedRoles = [];

        async function login(name, product) {
            currentPM = name; currentProduct = product;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('pmName').innerText = name;
            document.getElementById('productName').innerText = product;
            const letter = product.charAt(product.length - 1); 
            document.getElementById('bodyTag').className = 'min-h-screen p-4 md:p-8 transition-colors duration-500 product-' + letter;
            fetchRoles();
        }

        async function fetchRoles() {
            const { data, error } = await supabaseClient
                .from('roles')
                .select('*')
                .eq('project_key', PROJECT_KEY)
                .or(`product.eq."${currentProduct}",product.eq.GLOBAL`);
            
            if (!error) { 
                cachedRoles = data; 
                renderCards(data); 
            }
        }

        function renderCards(roles) {
            const containers = { template: document.getElementById('templateContainer'), draft: document.getElementById('draftContainer'), active: document.getElementById('activeContainer') };
            Object.values(containers).forEach(c => c.innerHTML = '');
            roles.forEach(role => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card flex flex-col h-full";
                const permsHtml = role.perms_json.map(p => `<span class="inline-block bg-slate-50 border border-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded font-bold uppercase mr-1 mb-1">${p}</span>`).join('');
                card.innerHTML = `<div class="flex-grow"><h4 class="font-black text-slate-800 text-lg mb-1">${role.role_name}</h4><div class="mb-6">${permsHtml}</div></div><div class="mt-4">${renderButtons(role)}</div>`;
                containers[role.status].appendChild(card);
            });
        }

        function renderButtons(role) {
            if (role.status === 'template') return `<button onclick="copyToDraft(${role.id})" class="w-full py-2.5 bg-slate-800 text-white text-xs font-bold rounded-xl hover:bg-slate-700 transition">Copy to ${currentProduct}</button>`;
            if (role.status === 'draft') return `<div class="flex gap-2"><button onclick="activate(${role.id})" class="flex-1 py-2.5 bg-emerald-600 text-white text-xs font-bold rounded-xl hover:bg-emerald-700 transition">Activate</button><button onclick="openEditModal(${role.id}, '${role.role_name}', '${role.perms_json}')" class="flex-1 py-2.5 border border-slate-800 text-slate-800 text-xs font-bold rounded-xl hover:bg-slate-50 transition">Edit</button></div>`;
            return `<div class="w-full py-2 bg-slate-50 border border-slate-200 text-slate-400 text-[10px] font-black text-center rounded-lg uppercase tracking-widest">Read Only</div>`;
        }

        async function copyToDraft(id) {
            const { data: source } = await supabaseClient.from('roles').select('*').eq('id', id).single();
            let newName = `Draft - ${source.role_name}`;
            
            const isDuplicate = cachedRoles.some(r => 
                r.product === currentProduct && 
                r.role_name.toLowerCase() === newName.toLowerCase()
            );

            if (isDuplicate) {
                newName = `${newName} (${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})})`;
            }

            await supabaseClient.from('roles').insert({ 
                product: currentProduct, 
                role_name: newName, 
                status: 'draft', 
                perms_json: source.perms_json,
                project_key: PROJECT_KEY 
            });
            fetchRoles();
        }

        function openEditModal(roleId, roleName, currentPermsStr) {
            const currentPerms = currentPermsStr ? currentPermsStr.split(',') : [];
            document.getElementById('editRoleId').value = roleId;
            document.getElementById('editRoleName').value = roleName;
            document.getElementById('modalErrorMsg').innerText = ""; 
            
            const container = document.getElementById('permissionOptions');
            container.innerHTML = ALL_PERMISSIONS.map(p => `
                <label class="flex items-center gap-3 p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition">
                    <input type="checkbox" value="${p}" class="perm-check w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" ${currentPerms.includes(p) ? 'checked' : ''}>
                    <span class="text-sm font-semibold text-slate-700">${p}</span>
                </label>
            `).join('');
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        async function saveChanges() {
            const roleId = document.getElementById('editRoleId').value;
            const newName = document.getElementById('editRoleName').value.trim();
            const selected = Array.from(document.querySelectorAll('.perm-check:checked')).map(cb => cb.value);
            
            const isDuplicate = cachedRoles.some(r => 
                r.product === currentProduct && 
                r.role_name.toLowerCase() === newName.toLowerCase() && 
                r.id.toString() !== roleId.toString()
            );

            if (isDuplicate) {
                document.getElementById('modalErrorMsg').innerText = `Role name "${newName}" already exists in ${currentProduct}.`;
                return;
            }

            if (newName === "") {
                document.getElementById('modalErrorMsg').innerText = "Role name cannot be empty.";
                return;
            }

            await supabaseClient.from('roles').update({ 
                role_name: newName,
                perms_json: selected,
                project_key: PROJECT_KEY
            }).eq('id', roleId);
            
            closeModal();
            fetchRoles();
        }

        async function activate(id) {
            await supabaseClient.from('roles').update({ status: 'active' }).eq('id', id);
            fetchRoles();
        }
    </script>
</body>
</html>
