name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' # Runs 9:00 AM UTC every Monday and Thursday
  workflow_dispatch: # Allows manual testing

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase API via cURL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing GitHub Secrets."
            exit 1
          fi
          
          echo "Pinging Supabase..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SUPABASE_URL/rest/v1/roles?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          
          echo "HTTP Response Status: $STATUS_CODE"
          
          if [ "$STATUS_CODE" -eq 200 ] || [ "$STATUS_CODE" -eq 204 ]; then
            echo "Success: Database is active."
          else
            echo "Error: Ping failed with status $STATUS_CODE"
            exit 1
          fi
