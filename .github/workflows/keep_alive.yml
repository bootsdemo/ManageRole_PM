name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' 
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Stick to 20 for now to match v4 actions perfectly

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js --force

      - name: Ping Supabase
        env:
          URL: ${{ secrets.SUPABASE_URL }} 
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          (async () => {
            try {
              const supabase = createClient(process.env.URL, process.env.KEY);
              const { data, error } = await supabase.from('roles').select('id').limit(1);
              if (error) throw error;
              console.log('Success: Database is active.');
            } catch (err) {
              console.error('FAILED:', err.message);
              process.exit(1);
            }
          })();
          "
