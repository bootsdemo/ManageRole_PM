name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' 
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      # This line opts into the newer Node version to remove the warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to Node 24

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js --force

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }} 
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          (async () => {
            try {
              if (!process.env.SUPABASE_URL || process.env.SUPABASE_KEY.includes('YOUR_')) {
                throw new Error('Secrets are not configured correctly in GitHub.');
              }

              const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

              // Perform a test query
              const { data, error, status } = await supabase
                .from('roles')
                .select('id')
                .limit(1);

              if (error) {
                console.error('Supabase API Error:', error.message);
                console.error('HTTP Status:', status);
                process.exit(1);
              }

              console.log('Ping successful. Database status: Active');
            } catch (err) {
              console.error('Workflow Error:', err.message);
              process.exit(1);
            }
          })();
          "
